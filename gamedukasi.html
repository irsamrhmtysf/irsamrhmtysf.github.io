<!DOCTYPE html>
<html lang="id">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9VY8Q1YK90"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9VY8Q1YK90');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Belajar Yuk! 🎓</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* ═══════════ TOKENS ═══════════ */
:root{
  --cp:#FF6B35;--cpd:#e55c28;
  --cv:#7B2FBE;--cvd:#5a1a9a;
  --cg:#2DC653;--cr:#E63946;
  --cy:#FFD60A;--cb:#3A86FF;
  --r:22px;--rs:14px;
  --sh:0 8px 0 rgba(0,0,0,.11);
  --shl:0 12px 40px rgba(0,0,0,.13);
  /* level skin */
  --lt:#FF6B35;--lt2:#ff8c42;--lb:#2DC653;--lbg:#fff8f5;--lbd:#ffe5d5;
}
body.lv-mudah {--lt:#4CAF50;--lt2:#81C784;--lb:#2DC653;--lbg:#f0fdf4;--lbd:#bbf7d0;}
body.lv-sedang{--lt:#FF6B35;--lt2:#ff8c42;--lb:#FF9800;--lbg:#fff8f5;--lbd:#ffe5d5;}
body.lv-susah {--lt:#7B2FBE;--lt2:#a855f7;--lb:#E63946;--lbg:#faf4ff;--lbd:#e9d5ff;}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;
  background:linear-gradient(180deg,#87CEEB 0%,#b0e4f7 38%,#c8f5c2 68%,#a8e6a3 100%);
  min-height:100vh;overflow-x:hidden;color:#2d2d2d;}

/* ═══════════ BG ═══════════ */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.cloud{position:absolute;background:rgba(255,255,255,.8);border-radius:50px;animation:cloudMove linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:inherit;border-radius:50%;}
.cloud::before{width:55%;height:150%;top:-30%;left:18%;}
.cloud::after {width:38%;height:110%;top:-15%;left:56%;}
@keyframes cloudMove{from{transform:translateX(-260px)}to{transform:translateX(110vw)}}
.grass{position:fixed;bottom:0;left:0;width:100%;height:26px;z-index:0;pointer-events:none;background:linear-gradient(#5cb85c,#4a9e4a);}
.garden{position:fixed;bottom:0;left:0;width:100%;height:96px;z-index:1;pointer-events:none;
  display:flex;align-items:flex-end;justify-content:space-around;padding:0 6px;}
.flower{font-size:1.7rem;line-height:1;animation:sway 3s ease-in-out infinite;transform-origin:bottom center;}
.flower:nth-child(even){animation-direction:alternate-reverse;font-size:1.35rem;}
.flower:nth-child(3n){animation-duration:3.9s;font-size:2rem;}
.flower:nth-child(5n){animation-duration:2.4s;}
@keyframes sway{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}

/* ═══════════ LAYOUT ═══════════ */
#root{position:relative;z-index:10;max-width:560px;margin:0 auto;padding:14px 12px 44px;}

/* ═══════════ HEADER ═══════════ */
.app-header{display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.88);backdrop-filter:blur(14px);
  border-radius:var(--r);padding:11px 16px;margin-bottom:14px;
  box-shadow:var(--sh);border:2px solid rgba(255,255,255,.92);}
.logo{display:flex;align-items:center;gap:8px;font-family:'Fredoka One',cursive;
  font-size:1.3rem;color:var(--cv);text-decoration:none;}
.logo-icon{font-size:1.9rem;animation:logoBounce 2.5s ease-in-out infinite;}
@keyframes logoBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.score-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.score-pill{display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--cv),#a855f7);
  color:#fff;border-radius:40px;padding:5px 13px;font-weight:900;font-size:.95rem;}
.score-num{font-family:'Fredoka One',cursive;font-size:1.15rem;}
.score-pop{animation:sPop .3s ease;}
@keyframes sPop{0%,100%{transform:scale(1)}50%{transform:scale(1.45)}}
.hi-pill{display:flex;align-items:center;gap:4px;background:rgba(255,214,0,.18);
  border:1.5px solid rgba(255,214,0,.5);color:#a07000;border-radius:40px;
  padding:2px 9px;font-weight:900;font-size:.68rem;}
.hi-pill span{font-family:'Fredoka One',cursive;font-size:.85rem;color:#c08000;}

/* ═══════════ CARD ═══════════ */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shl);border:3px solid rgba(255,255,255,.95);overflow:hidden;}

/* ═══════════ TOPIC ═══════════ */
.topic-head{text-align:center;padding:22px 20px 14px;
  background:linear-gradient(135deg,var(--cv),#a855f7);color:#fff;
  position:relative;overflow:hidden;}
.topic-head h1{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,6vw,2.1rem);margin-bottom:3px;}
.topic-head p{font-size:.88rem;opacity:.85;}
.topic-sparkle{position:absolute;font-size:2rem;animation:sparkleFloat 3s ease-in-out infinite;opacity:.4;}
.topic-sparkle:nth-child(2){top:8px;left:12px;animation-delay:0s;}
.topic-sparkle:nth-child(3){top:8px;right:12px;animation-delay:.8s;}
.topic-sparkle:nth-child(4){bottom:8px;left:30px;animation-delay:1.5s;}
.topic-sparkle:nth-child(5){bottom:8px;right:30px;animation-delay:2.1s;}
@keyframes sparkleFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-8px) scale(1.2);}}

.lv-picker{display:flex;gap:8px;padding:14px 16px;background:#f8f4ff;
  border-bottom:2px solid #ede8ff;justify-content:center;}
.lv-btn{flex:1;max-width:115px;padding:9px 5px;border-radius:28px;
  border:2.5px solid #ddd;background:#fff;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.8rem;cursor:pointer;transition:all .18s;color:#888;text-align:center;}
.lv-btn:hover{border-color:var(--cp);color:var(--cp);}
.lv-btn.active{color:#fff;border-color:transparent;box-shadow:0 4px 0 rgba(0,0,0,.18);transform:translateY(-2px);}
.lv-btn[data-lv="mudah"].active{background:linear-gradient(135deg,#4CAF50,#81C784);}
.lv-btn[data-lv="sedang"].active{background:linear-gradient(135deg,#FF6B35,#ff9d00);}
.lv-btn[data-lv="susah"].active{background:linear-gradient(135deg,#7B2FBE,#a855f7);}
.lv-tag{display:block;font-size:.6rem;letter-spacing:.4px;margin-top:1px;opacity:.85;}

.topics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;padding:14px;}
.topic-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  padding:16px 6px;border-radius:18px;border:3px solid #e8e0f8;
  background:linear-gradient(160deg,#faf8ff,#f0ebff);cursor:pointer;transition:all .2s;
  font-family:'Fredoka One',cursive;color:var(--cv);box-shadow:0 5px 0 #d8cff0;user-select:none;}
.topic-tile:hover{transform:translateY(-4px);box-shadow:0 9px 0 #c8bfe8;border-color:var(--cv);background:#ede8ff;}
.topic-tile:active{transform:translateY(1px);box-shadow:0 2px 0 #c8bfe8;}
.t-emoji{font-size:2.4rem;}.t-name{font-size:.84rem;}

/* ═══════════ GAME ═══════════ */
.game-topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 10px;
  background:linear-gradient(135deg,var(--lt),var(--lt2));color:#fff;transition:background .4s;}
.game-topic-lbl{font-family:'Fredoka One',cursive;font-size:1.05rem;}
.game-stars{font-size:1.25rem;letter-spacing:2px;}

.game-meta{display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px 5px;background:var(--lbg);border-bottom:2px solid var(--lbd);
  font-size:.75rem;font-weight:800;color:#aaa;transition:background .4s,border-color .4s;}
.combo-badge{border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:900;color:#fff;animation:comboPop .4s ease;}
.combo-badge.c2{background:linear-gradient(90deg,#ff9d00,#ffd60a);}
.combo-badge.c3{background:linear-gradient(90deg,#ff6b35,#ff9d00);}
.combo-badge.c5{background:linear-gradient(90deg,#e63946,#ff6b35);}
.combo-badge.c8{background:linear-gradient(90deg,#7b2fbe,#e63946);animation:comboPop .25s ease infinite;}
@keyframes comboPop{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

.prog-wrap{padding:0 16px 9px;background:var(--lbg);transition:background .4s;}
.prog-track{height:9px;background:var(--lbd);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--lt),var(--lt2));
  transition:width .45s cubic-bezier(.34,1.56,.64,1);}

.timer-wrap{padding:7px 16px 11px;display:flex;align-items:center;gap:10px;background:var(--lbg);transition:background .4s;}
.timer-track{flex:1;height:11px;background:var(--lbd);border-radius:99px;overflow:hidden;}
.timer-fill{height:100%;border-radius:99px;background:var(--lb);transition:width .1s linear;}
.timer-num{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--lt);min-width:26px;text-align:right;}
.timer-urgent .timer-fill{background:var(--cr)!important;animation:timerPulse .38s ease-in-out infinite;}
.timer-urgent .timer-num{color:var(--cr)!important;}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.55}}

.q-box{margin:0 14px 14px;padding:18px 14px;
  background:linear-gradient(135deg,#f8f4ff,#eff8ff);
  border-radius:var(--rs);border:2.5px solid #e4deff;text-align:center;}
.q-instr{font-size:.7rem;font-weight:800;color:#bbb;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.q-main{display:flex;justify-content:center;align-items:center;min-height:100px;}
.q-main.type-huruf{font-family:'Fredoka One',cursive;font-size:clamp(5rem,20vw,8rem);font-weight:900;line-height:1;
  background:linear-gradient(135deg,#7B2FBE,#FF6B35,#FFD60A);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(2px 3px 0 rgba(0,0,0,.1));animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
.q-main.type-angka{font-family:'Fredoka One',cursive;font-size:clamp(5rem,20vw,8rem);
  color:var(--cv);filter:drop-shadow(2px 3px 0 rgba(0,0,0,.09));animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
.q-main.type-emoji{font-size:clamp(4rem,16vw,6.5rem);line-height:1.1;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
.q-main.type-svg{animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.15) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 10px;}
.choice-btn{width:100%;padding:13px 9px;border-radius:16px;border:3px solid #e4deff;background:#fff;
  font-family:'Nunito',sans-serif;font-size:clamp(.86rem,3.7vw,1.02rem);font-weight:800;color:#444;
  cursor:pointer;box-shadow:0 5px 0 #d8cff0;transition:all .14s;text-align:center;line-height:1.3;}
.choice-btn:hover:not(.disabled){border-color:var(--cv);background:#f0ebff;transform:translateY(-3px);box-shadow:0 8px 0 #c8bfe8;}
.choice-btn:active:not(.disabled){transform:translateY(2px);box-shadow:0 2px 0 #c8bfe8;}
.choice-btn.correct{background:#d4faea;border-color:var(--cg);color:#064e3b;box-shadow:0 5px 0 #6ee7c4;animation:correctBounce .42s ease;}
.choice-btn.wrong{background:#ffe4e8;border-color:var(--cr);color:#7f1d1d;box-shadow:0 5px 0 #fca5a5;animation:wrongShake .38s ease;}
.choice-btn.reveal{background:#d4faea;border-color:var(--cg);color:#064e3b;}
.choice-btn.disabled{pointer-events:none;opacity:.8;}
@keyframes correctBounce{0%{transform:scale(1)}30%{transform:scale(1.1) rotate(2deg)}60%{transform:scale(.97)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

.feedback-bar{min-height:34px;padding:0 14px 7px;display:flex;align-items:center;justify-content:center;}
.fb{font-size:.92rem;font-weight:900;text-align:center;padding:7px 16px;border-radius:28px;}
.fb.ok {background:#d4faea;color:#065f46;}
.fb.err{background:#ffe4e8;color:#7f1d1d;}
.fb.to {background:#fff3cd;color:#7c5800;}

.next-btn{display:none;width:calc(100% - 28px);margin:0 14px 14px;padding:14px;
  background:linear-gradient(90deg,var(--cv),#a855f7);color:#fff;border:none;
  border-radius:16px;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;
  box-shadow:0 5px 0 var(--cvd);transition:all .14s;}
.next-btn:hover{opacity:.92;transform:translateY(-2px);}
.next-btn:active{transform:translateY(2px);}

/* ═══════════ END SCREEN ═══════════ */
.end-top{text-align:center;padding:26px 20px 18px;
  background:linear-gradient(135deg,var(--cv),#a855f7);color:#fff;transition:background 1s;}
.end-top.celebrate-bg{animation:celebBg 2s ease-in-out infinite;}
@keyframes celebBg{
  0%  {background:linear-gradient(135deg,#7B2FBE,#a855f7);}
  20% {background:linear-gradient(135deg,#FF6B35,#FFD60A);}
  40% {background:linear-gradient(135deg,#2DC653,#00BCD4);}
  60% {background:linear-gradient(135deg,#F72585,#FF9D00);}
  80% {background:linear-gradient(135deg,#3A86FF,#7B2FBE);}
  100%{background:linear-gradient(135deg,#7B2FBE,#a855f7);}
}
.trophy{font-size:4.8rem;display:block;animation:trophyDrop .65s cubic-bezier(.34,1.56,.64,1);}
@keyframes trophyDrop{from{transform:scale(0) rotate(-22deg)}to{transform:scale(1) rotate(0)}}
.trophy.perfect-trophy{animation:trophyDrop .65s cubic-bezier(.34,1.56,.64,1),perfectPulse 1.2s ease-in-out .7s infinite;}
@keyframes perfectPulse{0%,100%{transform:scale(1) rotate(0);filter:drop-shadow(0 0 4px #FFD60A);}
  50%{transform:scale(1.22) rotate(8deg);filter:drop-shadow(0 0 24px #FFD60A);}}
.end-title{font-family:'Fredoka One',cursive;font-size:1.75rem;margin:7px 0 3px;}
.end-stars{font-size:2.6rem;letter-spacing:4px;}
.end-stars.star-dance span{display:inline-block;animation:starDance .6s ease-in-out infinite;}
.end-stars.star-dance span:nth-child(2){animation-delay:.12s;}
.end-stars.star-dance span:nth-child(3){animation-delay:.24s;}
.end-stars.star-dance span:nth-child(4){animation-delay:.36s;}
.end-stars.star-dance span:nth-child(5){animation-delay:.48s;}
@keyframes starDance{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-10px) scale(1.3);}}
.end-score-pill{display:inline-block;margin-top:9px;background:rgba(255,255,255,.22);
  border:2px solid rgba(255,255,255,.45);border-radius:40px;padding:5px 20px;
  font-family:'Fredoka One',cursive;font-size:1.35rem;}

.end-body{padding:18px;}
.stat-row{display:flex;gap:9px;margin-bottom:14px;}
.stat-box{flex:1;text-align:center;border-radius:14px;padding:13px 7px 9px;
  cursor:pointer;transition:all .17s;user-select:none;border:2.5px solid;}
.stat-box:hover{transform:translateY(-3px);}
.stat-box:active{transform:translateY(1px);}
.s-ok  {border-color:#86efac;background:#f0fdf4;}.s-ok:hover  {box-shadow:0 6px 0 #bbf7d0;}
.s-bad {border-color:#fca5a5;background:#fff5f5;}.s-bad:hover {box-shadow:0 6px 0 #fecaca;}
.s-fire{border-color:#fdba74;background:#fff7ed;}.s-fire:hover{box-shadow:0 6px 0 #fed7aa;}
.s-val{font-family:'Fredoka One',cursive;font-size:1.75rem;}
.s-ok .s-val{color:#16a34a;}.s-bad .s-val{color:var(--cr);}.s-fire .s-val{color:#ea580c;}
.s-lbl{font-size:.65rem;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.s-tap{font-size:.56rem;color:#ccc;font-weight:700;margin-top:2px;}
.no-tap .s-tap{visibility:hidden;}
.new-rec{display:inline-block;margin-left:5px;background:var(--cy);color:#7c5800;
  border-radius:18px;padding:1px 7px;font-size:.62rem;font-weight:900;
  animation:recPop .38s cubic-bezier(.34,1.56,.64,1);}
@keyframes recPop{from{transform:scale(0)}to{transform:scale(1)}}

.share-section{margin-bottom:14px;}
.share-section h3{font-size:.82rem;font-weight:800;color:var(--cv);margin-bottom:7px;text-align:center;}
.share-btns{display:flex;gap:7px;justify-content:center;}
.share-btn{display:inline-flex;align-items:center;gap:5px;padding:9px 15px;border-radius:28px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;cursor:pointer;border:none;
  transition:all .16s;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.18);}
.share-btn:hover{transform:translateY(-2px);color:#fff;}.share-btn:active{transform:translateY(1px);}
.btn-wa{background:#25D366;}
.action-btns{display:flex;gap:9px;}
.btn-main{flex:1;padding:14px;background:linear-gradient(90deg,var(--cp),#ff8c42);
  color:#fff;border:none;border-radius:16px;font-family:'Fredoka One',cursive;font-size:1.05rem;
  cursor:pointer;box-shadow:0 5px 0 var(--cpd);transition:all .14s;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--cpd);}
.btn-sub{flex:1;padding:14px;background:#f0ebff;color:var(--cv);border:none;
  border-radius:16px;font-family:'Fredoka One',cursive;font-size:1.05rem;
  cursor:pointer;box-shadow:0 5px 0 #d8cff0;transition:all .14s;}
.btn-sub:hover{transform:translateY(-2px);box-shadow:0 7px 0 #c8bfe8;background:#e8e0ff;}

/* ═══════════ MODAL ═══════════ */
.modal-content{border:none!important;border-radius:20px!important;overflow:hidden;}
.modal-header{border-bottom:2px solid #f0f0f0!important;padding:13px 18px!important;}
.modal-title{font-family:'Fredoka One',cursive!important;font-size:1.05rem!important;}
.modal-body{padding:14px!important;}
.btn-close{opacity:.45;}.btn-close:hover{opacity:.9;}
.review-item{display:flex;align-items:center;gap:10px;padding:9px 11px;margin-bottom:7px;border-radius:13px;border:2px solid;}
.review-item.ok {background:#f0fdf4;border-color:#bbf7d0;}
.review-item.bad{background:#fff5f5;border-color:#fecaca;}
.ri-q{font-size:1.75rem;min-width:36px;text-align:center;}
.ri-ans{font-weight:900;font-size:.88rem;color:#15803d;}
.ri-meta{font-size:.68rem;font-weight:800;margin-top:1px;}
.ok  .ri-meta{color:#86efac;}.bad .ri-meta{color:#f87171;}
.combo-empty{text-align:center;padding:20px;color:#ccc;font-weight:800;font-size:.85rem;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bar-lbl{font-size:.75rem;font-weight:800;color:#888;min-width:55px;}
.bar-track{flex:1;height:17px;background:#f0f0f0;border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.bar-num{font-family:'Fredoka One',cursive;font-size:.85rem;color:#ea580c;min-width:22px;}

/* ═══════════ PARTICLES ═══════════ */
.confetti-piece{position:fixed;pointer-events:none;z-index:9999;animation:confettiFall linear forwards;border-radius:3px;}
@keyframes confettiFall{0%{transform:translateY(-5vh) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.star-burst{position:fixed;pointer-events:none;z-index:9999;animation:starBurst .75s ease forwards;}
@keyframes starBurst{0%{transform:translate(0,0) scale(0);opacity:1}60%{opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1.3);opacity:0}}

/* ═══════════ RESPONSIVE ═══════════ */
@media(max-width:400px){
  .topics-grid{gap:7px;}.topic-tile{padding:13px 4px;}.t-emoji{font-size:2rem;}
  .choice-btn{padding:11px 5px;font-size:.82rem;}
}
</style>
</head>
<body>

<div class="sky" id="sky"></div>
<div class="grass"></div>
<div class="garden" id="garden"></div>

<div id="root">
  <header class="app-header">
    <a class="logo" href="#"><span class="logo-icon"></span> Belajar Yuk!</a>
    <div class="score-wrap" id="score-wrap" style="display:none">
      <div class="score-pill">⭐ <span class="score-num" id="score-display">0</span></div>
      <div class="hi-pill">🏅 <span id="hi-display">0</span></div>
    </div>
  </header>

  <!-- TOPIC -->
  <div class="card" id="topic-screen">
    <div class="topic-head">
      <span class="topic-sparkle"></span>
	  <span class="topic-sparkle"></span>
      <span class="topic-sparkle"></span>
	  <span class="topic-sparkle"></span>

'use strict';
/* ─── AUDIO ENGINE ─── */
let AC;
const initAC = () => { if(!AC) AC = new(window.AudioContext||window.webkitAudioContext)(); };
const resumeAC = () => { initAC(); if(AC.state==='suspended') AC.resume(); };

function tone(f,d,type='sine',vol=.25,startOffset=0){
  if(!AC) return;
  try{
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=f;
    const t=AC.currentTime+startOffset;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.015);
    g.gain.setValueAtTime(vol,t+d-0.02);
    g.gain.linearRampToValueAtTime(0,t+d);
    o.start(t); o.stop(t+d);
  }catch(e){}
}

/* Opening jingle — cheerful 8-note melody */
function sfxOpening(){
  if(!AC) return;
  const notes=[
    [523,0.00],[659,0.14],[784,0.28],[1047,0.42],
    [784,0.56],[880,0.70],[1047,0.84],[1319,0.98]
  ];
  notes.forEach(([f,s])=>tone(f,.18,'sine',.28,s));
}

/* Correct answer — quick ascending triad */
function sfxCorrect(){
  [523,659,784,1047].forEach((f,i)=>tone(f,.13,'sine',.26,i*0.07));
}

/* Wrong answer */
function sfxWrong(){
  tone(300,.18,'sawtooth',.2,0);
  tone(220,.22,'sawtooth',.18,0.12);
}

/* Game start */
function sfxStart(){
  [400,520,640,800].forEach((f,i)=>tone(f,.1,'sine',.2,i*0.07));
}

/* Timer tick — descending urgency */
function sfxTick(){
  const steps=[880,784,698,659,587];
  const i=Math.round((1-timeLeft/3)*(steps.length-1));
  tone(steps[Math.max(0,Math.min(i,steps.length-1))], .06, 'sine', .09, 0);
}

/* Win — short fanfare */
function sfxWin(){
  [523,659,784,1047,1319].forEach((f,i)=>tone(f,.18,'sine',.28,i*0.08));
}

/* Lose */
function sfxLose(){
  tone(350,.28,'sawtooth',.2,0);
  tone(280,.32,'sawtooth',.18,0.14);
}

/* 🎺 TRUMPET FANFARE — triumphal ascending melody */
function sfxFanfare(){
  if(!AC) return;
  const melody=[
    // [freq, startSec, durSec, vol]
    [523.25, 0.00, 0.12, .30],
    [659.25, 0.10, 0.12, .30],
    [783.99, 0.20, 0.12, .30],
    [1046.5, 0.30, 0.28, .38],
    [783.99, 0.55, 0.09, .26],
    [1046.5, 0.62, 0.09, .28],
    [1174.7, 0.70, 0.09, .30],
    [1318.5, 0.78, 0.42, .38],
    [1046.5, 1.18, 0.10, .26],
    [1174.7, 1.27, 0.10, .26],
    [1318.5, 1.36, 0.10, .28],
    [1567.9, 1.45, 0.55, .42],
  ];
  melody.forEach(([f,s,d,v])=>{
    try{
      const o=AC.createOscillator(), g=AC.createGain();
      const vib=AC.createOscillator(), vg=AC.createGain();
      vib.frequency.value=5.5; vg.gain.value=9;
      vib.connect(vg); vg.connect(o.frequency);
      o.type='sawtooth'; o.frequency.value=f;
      o.connect(g); g.connect(AC.destination);
      const t=AC.currentTime+s;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(v,t+0.02);
      g.gain.setValueAtTime(v,t+d-0.03);
      g.gain.linearRampToValueAtTime(0,t+d);
      o.start(t); o.stop(t+d);
      vib.start(t); vib.stop(t+d);
    }catch(e){}
  });
  // Snare drum at beat 1
  try{
    const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*.08),AC.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,2.5)*.7;
    const src=AC.createBufferSource(), g=AC.createGain();
    src.buffer=buf; g.gain.value=.6;
    src.connect(g); g.connect(AC.destination);
    src.start(AC.currentTime);
  }catch(e){}
}

  'pelangi':        `<svg width="120" height="70" viewBox="0 0 120 70"><path d="M10,65A50,50 0,0,1 110,65" stroke="#E63946" stroke-width="10" fill="none"/><path d="M18,65A42,42 0,0,1 102,65" stroke="#FF9800" stroke-width="8" fill="none"/><path d="M25,65A35,35 0,0,1 95,65" stroke="#FFD60A" stroke-width="7" fill="none"/><path d="M31,65A29,29 0,0,1 89,65" stroke="#4CAF50" stroke-width="6" fill="none"/><path d="M37,65A23,23 0,0,1 83,65" stroke="#2196F3" stroke-width="5" fill="none"/></svg>`,
  'perisai':        `<svg width="100" height="115" viewBox="0 0 100 115"><path d="M50 8L92 24L92 58C92 82 50 107 50 107C50 107 8 82 8 58L8 24Z" fill="#7B2FBE" filter="drop-shadow(0 4px 8px rgba(0,0,0,.18))"/></svg>`,
  'bintang6':       `<svg width="110" height="110" viewBox="0 0 110 110"><polygon points="55,8 63,36 92,36 70,54 78,82 55,66 32,82 40,54 18,36 47,36" fill="#FF6B35" filter="drop-shadow(0 4px 8px rgba(0,0,0,.18))"/><polygon points="55,102 47,74 18,74 40,56 32,28 55,44 78,28 70,56 92,74 63,74" fill="#FFD60A" opacity=".9"/></svg>`,
  'trapesium':      `<svg width="120" height="90" viewBox="0 0 120 90"><polygon points="20,80 100,80 90,10 30,10" fill="#9C27B0" filter="drop-shadow(0 4px 8px rgba(0,0,0,.18))"/></svg>`,
};

/* ─── LEVEL CONFIG ─── */
const LV = {
  mudah: {time:15, q:15},
  sedang:{time:10, q:15},
  susah: {time:5,  q:15}
};

/* ─── STATE ─── */
let topic='huruf', topicLabel='🔤 Huruf', level='mudah';
let queue=[], qIdx=0, score=0, combo=0, maxCombo=0;
let answered=false, correctCount=0, wrongCount=0;
let correctLog=[], wrongLog=[], comboLog=[];
let timerInt=null, timeLeft=0;
let _celebInt=null;

const $ = id => document.getElementById(id);
const shuffle = a => [...a].sort(()=>Math.random()-.5);

/* ─── BUILD BACKGROUND ─── */
(()=>{
  const sky=$('sky');
  for(let i=0;i<4;i++){
    const c=document.createElement('div'); c.className='cloud';
    const h=11+Math.random()*15, w=65+Math.random()*115;
    c.style.cssText=`width:${w}px;height:${h}px;top:${4+Math.random()*38}%;animation-duration:${20+Math.random()*20}s;animation-delay:-${Math.random()*22}s;opacity:${.45+Math.random()*.35};`;
    sky.appendChild(c);
  }
  const g=$('garden');
  ['🌸','🌼','🌻','🌺','🌷','💐','🌸','🌼','🌻','🌺','🌷','🌸','🌼','🌺','🌻','🌷','🌸','🌼'].forEach(f=>{
    const el=document.createElement('div'); el.className='flower'; el.textContent=f;
    g.appendChild(el);
  });
})();

/* ─── SCREEN MANAGEMENT ─── */
function stopCelebration(){
  clearInterval(_celebInt); _celebInt=null;
  const t=$('end-trophy'), et=$('end-top');
  if(t) t.classList.remove('perfect-trophy');
  if(et) et.classList.remove('celebrate-bg');
  const es=$('end-stars');
  if(es) es.classList.remove('star-dance');
}

function showTopic(){
  stopCelebration();
  $('topic-screen').style.display='block';
  $('game-screen').style.display='none';
  $('end-screen').style.display='none';
  $('score-wrap').style.display='none';
  document.body.className='';
}
function showGame(){
  $('topic-screen').style.display='none';
  $('game-screen').style.display='block';
  $('end-screen').style.display='none';
  $('score-wrap').style.display='flex';
  document.body.className=`lv-${level}`;
  $('hi-display').textContent = +localStorage.getItem(`hi_${topic}_${level}`)||0;
}
function showEnd(){
  $('topic-screen').style.display='none';
  $('game-screen').style.display='none';
  $('end-screen').style.display='block';
  $('score-wrap').style.display='none';
}

/* ─── LEVEL ─── */
const setLevel = btn => {
  document.querySelectorAll('.lv-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); level=btn.dataset.lv;
};

/* ─── GAME FLOW ─── */
const pickTopic = (t,l) => { resumeAC(); topic=t; topicLabel=l; startGame(); };

function startGame(){
  stopCelebration();
  const cfg=LV[level];
  queue=shuffle(DATA[topic].items).slice(0,cfg.q);
  qIdx=0; score=0; combo=0; maxCombo=0;
  correctCount=0; wrongCount=0; correctLog=[]; wrongLog=[]; comboLog=[];
  updateScore(0);
  $('game-topic-lbl').textContent=topicLabel;
  $('game-stars').textContent='⭐⭐⭐';
  showGame();
  sfxStart();
  renderQ();
}

function renderQ(){
  if(qIdx>=queue.length){ endGame(); return; }
  answered=false;
  const q=queue[qIdx], t=DATA[topic].qType;

  $('q-instr').textContent=DATA[topic].label.toUpperCase();

  const qm=$('q-main');
  qm.className='q-main';
  if     (t==='huruf') { qm.textContent=q.q; qm.classList.add('type-huruf'); }
  else if(t==='angka') { qm.textContent=q.q; qm.classList.add('type-angka'); }
  else if(t==='warna') { qm.innerHTML=renderWarna(q.q); qm.classList.add('type-svg'); }
  else if(t==='bentuk'){ qm.innerHTML=SHP[q.q]||q.q; qm.classList.add('type-svg'); }
  else                  { qm.textContent=q.q; qm.classList.add('type-emoji'); }
  void qm.offsetWidth; // replay animation

  $('feedback').style.display='none';
  $('next-btn').style.display='none';
  $('q-counter').textContent=`Soal ${qIdx+1}/${LV[level].q}`;
  $('combo-lbl').innerHTML = combo>=2
    ? `<span class="combo-badge ${combo>=8?'c8':combo>=5?'c5':combo>=3?'c3':'c2'}">🔥 Combo x${combo}${combo>=5?' 🔥':''}</span>`
    : '';
  $('prog-fill').style.width=(qIdx/LV[level].q*100)+'%';

  const grid=$('choices'); grid.innerHTML='';
  shuffle(q.ch).forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=c;
    btn.addEventListener('click',()=>{ resumeAC(); checkAnswer(c,btn,q); });
    grid.appendChild(btn);
  });
  startTimer();
}
const nextQ = () => { qIdx++; renderQ(); };

/* ─── TIMER ─── */
function startTimer(){
  clearInterval(timerInt);
  timeLeft=LV[level].time;
  updateTimerUI();
  timerInt=setInterval(()=>{
    timeLeft=Math.max(0, +(timeLeft-.1).toFixed(1));
    if(timeLeft<=3 && !answered) sfxTick();
    updateTimerUI();
    if(timeLeft===0){ clearInterval(timerInt); if(!answered) timeUp(); }
  },100);
}
function updateTimerUI(){
  const pct=timeLeft/LV[level].time*100;
  $('timer-fill').style.width=Math.max(0,pct)+'%';
  $('timer-num').textContent=Math.ceil(Math.max(0,timeLeft));
  $('timer-wrap').classList.toggle('timer-urgent', timeLeft<=3);
}
function timeUp(){
  answered=true; combo=0; wrongCount++;
  sfxWrong(); wrongLog.push(queue[qIdx]);
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent===queue[qIdx].a) b.classList.add('reveal');
  });
  showFb('⏰ Waktu habis! Jawaban: '+queue[qIdx].a,'to');
  $('next-btn').style.display='block';
}

/* ─── CHECK ANSWER ─── */
function checkAnswer(chosen, btn, q){
  if(answered) return;
  answered=true; clearInterval(timerInt);

  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent===q.a) b.classList.add('correct');
  });

  if(chosen===q.a){
    sfxCorrect(); combo++; correctCount++;
    if(combo>maxCombo) maxCombo=combo;
    const bonus=combo>=2?combo*5:0, tB=Math.floor(timeLeft)*2, gain=10+bonus+tB;
    score+=gain; updateScore(score);
    correctLog.push({...q, timeLeft:Math.round(timeLeft*10)/10, gained:gain});
    if(combo>=2) comboLog.push({soal:qIdx+1, combo});
    showFb(`✅ Betul! +${gain} poin${bonus?` +🔥${bonus}`:''}  ⏱+${tB}`,'ok');
    $('game-stars').textContent = score>=LV[level].q*22?'⭐⭐⭐':score>=LV[level].q*14?'⭐⭐':'⭐';
    spawnStars(btn);
  } else {
    btn.classList.remove('correct'); btn.classList.add('wrong');
    sfxWrong(); combo=0; wrongCount++;
    wrongLog.push(q);
    showFb(`❌ Salah! Jawaban: ${q.a}`,'err');
  }
  $('next-btn').style.display='block';
}

const showFb = (msg,type) => {
  const f=$('feedback');
  f.textContent=msg; f.className='fb '+type; f.style.display='inline-block';
};

function updateScore(v){
  const el=$('score-display');
  el.textContent=v;
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
  const hi=+localStorage.getItem(`hi_${topic}_${level}`)||0;
  $('hi-display').textContent=Math.max(hi,v);
}

/* ─── STAR BURST ─── */
function spawnStars(btn){
  const {left,top,width,height}=btn.getBoundingClientRect();
  const cx=left+width/2, cy=top+height/2;
  ['⭐','✨','🌟','💛','🎉','⭐','✨'].forEach((ic,i)=>{
    const el=document.createElement('div');
    el.className='star-burst'; el.textContent=ic;
    const a=(i/7)*Math.PI*2, d=50+Math.random()*40;
    el.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${i*28}ms;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 900);
  });
}

/* ─── CONFETTI ─── */
function confetti(){
  const cols=['#FF6B35','#7B2FBE','#FFD60A','#2DC653','#3A86FF','#F72585','#FF9D00','#00BCD4'];
  const shapes=['50%','3px','0'];
  for(let i=0;i<90;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    const size=6+Math.random()*10;
    el.style.cssText=
      `left:${Math.random()*100}vw;top:-12px;`+
      `width:${size}px;height:${size*(Math.random()>.5?1:2.2)}px;`+
      `background:${cols[i%cols.length]};border-radius:${shapes[i%shapes.length]};`+
      `animation-duration:${1.3+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`+
      `transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 4000);
  }
}

/* ─── EMOJI BURST from screen center ─── */
function emojiBurst(){
  const icons=['🎉','🌟','⭐','🏆','🎊','💛','🎈','✨','🌈','🎀','🎁','🥳'];
  const cx=window.innerWidth/2, cy=window.innerHeight*0.35;
  for(let i=0;i<14;i++){
    const el=document.createElement('div');
    el.className='star-burst';
    el.textContent=icons[i%icons.length];
    const a=(i/14)*Math.PI*2, d=90+Math.random()*90;
    el.style.cssText=
      `left:${cx}px;top:${cy}px;`+
      `--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;`+
      `animation-duration:1.1s;animation-delay:${i*55}ms;`+
      `font-size:${1.2+Math.random()*1}rem;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1400);
  }
}

/* ─── END GAME ─── */
function endGame(){
  clearInterval(timerInt);
  stopCelebration();

  const total=LV[level].q;
  const pct=score/(total*30);
  const great  = pct>=.8;                              // good result — basic win
  const perfect = correctCount===total && maxCombo===total; // ALL correct + full combo chain

  const key=`hi_${topic}_${level}`, prev=+localStorage.getItem(key)||0, isRec=score>prev;
  if(isRec) localStorage.setItem(key, score);

  showEnd();

  // Trophy + title + stars
  if(perfect){
    $('end-trophy').textContent='🎓';
    $('end-title').textContent='CONGRADUATION';
    $('end-stars').innerHTML='<span>🌟</span><span>🌟</span><span>🥇</span><span>🌟</span><span>🌟</span>';
  } else if(great){
    $('end-trophy').textContent='🥈';
    $('end-title').textContent='Keep Learning';
    $('end-stars').innerHTML='<span>⭐</span><span>⭐</span><span>⭐</span>';
  } else if(pct>=.5){
    $('end-trophy').textContent='👍';
    $('end-title').textContent='Keep Learning';
    $('end-stars').innerHTML='';
  } else {
    $('end-trophy').textContent='🤣';
    $('end-title').textContent='Try Again';
    $('end-stars').innerHTML='';
  }

  $('end-score').innerHTML=`${score} poin${isRec?'  <span class="new-rec">🏅 Rekor Baru!</span>':''}`;
  $('stat-ok').textContent   = correctCount;
  $('stat-bad').textContent  = wrongCount;
  $('stat-combo').textContent= maxCombo;
  $('box-ok').classList.toggle('no-tap',   correctCount===0);
  $('box-bad').classList.toggle('no-tap',  wrongCount===0);
  $('box-fire').classList.toggle('no-tap', maxCombo<2);

  // Base audio
  great ? sfxWin() : sfxLose();

  if(perfect){
    // 🎺 FOREVER celebration — 100% benar + full combo
    resumeAC();
    setTimeout(()=>sfxFanfare(), 600);
    confetti(); emojiBurst();
    $('end-trophy').classList.add('perfect-trophy');
    $('end-top').classList.add('celebrate-bg');
    $('end-stars').classList.add('star-dance');
    _celebInt = setInterval(()=>{
      confetti(); emojiBurst();
      setTimeout(()=>sfxFanfare(), 300);
    }, 5200);
  } else if(great){
    // Good result — one-time confetti only
    confetti();
  }
}

/* ─── REVIEW MODAL ─── */
let _modal=null;
function thumb(item){
  const t=DATA[topic].qType;
  if(t==='warna')  return renderWarna(item.q).replace(/width="\d+"/,'width="38"').replace(/height="\d+"/,'height="38"');
  if(t==='bentuk') return (SHP[item.q]||item.q).replace(/width="\d+"/,'width="38"').replace(/height="\d+"/,'height="38"');
  return item.q;
}
function openModal(type){
  const body=$('modal-body'), title=$('modal-title');
  body.innerHTML='';
  const empty=msg=>`<div class="combo-empty">${msg}</div>`;

  if(type==='ok'){
    title.textContent=`✅ ${correctCount} Jawaban Benar`;
    if(!correctCount){ body.innerHTML=empty('Belum ada jawaban benar 😢'); }
    else {
      const seen=new Set();
      correctLog.forEach(c=>{
        if(seen.has(c.q)) return; seen.add(c.q);
        const d=document.createElement('div'); d.className='review-item ok';
        d.innerHTML=`<div class="ri-q">${thumb(c)}</div><div><div class="ri-ans">✅ ${c.a}</div><div class="ri-meta">⏱ sisa ${c.timeLeft}s · +${c.gained} poin</div></div>`;
        body.appendChild(d);
      });
    }
  } else if(type==='bad'){
    title.textContent=`❌ ${wrongCount} Jawaban Salah`;
    if(!wrongCount){ body.innerHTML=empty('Sempurna! Tidak ada yang salah 🎉'); }
    else {
      const seen=new Set();
      wrongLog.forEach(w=>{
        if(seen.has(w.q)) return; seen.add(w.q);
        const d=document.createElement('div'); d.className='review-item bad';
        d.innerHTML=`<div class="ri-q">${thumb(w)}</div><div><div class="ri-meta">Jawaban yang benar:</div><div class="ri-ans">✅ ${w.a}</div></div>`;
        body.appendChild(d);
      });
    }
  } else {
    title.textContent=`🔥 Combo Terbaik: x${maxCombo}`;
    if(maxCombo<2){ body.innerHTML=empty('Belum ada combo. Jawab berturut-turut! 🔥'); }
    else {
      const maxC=Math.max(...comboLog.map(c=>c.combo),1);
      comboLog.forEach(c=>{
        const pct=Math.round(c.combo/maxC*100);
        const col=c.combo>=8?'linear-gradient(90deg,#7b2fbe,#e63946)':c.combo>=5?'linear-gradient(90deg,#e63946,#ff6b35)':c.combo>=3?'linear-gradient(90deg,#ff6b35,#ff9d00)':'linear-gradient(90deg,#ff9d00,#ffd60a)';
        const d=document.createElement('div'); d.className='bar-row';
        d.innerHTML=`<div class="bar-lbl">Soal ${c.soal}</div><div class="bar-track"><div class="bar-fill" style="width:0%;background:${col}" data-w="${pct}"></div></div><div class="bar-num">x${c.combo}</div>`;
        body.appendChild(d);
      });
      setTimeout(()=>body.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.w+'%'), 50);
    }
  }
  if(!_modal) _modal=new bootstrap.Modal($('reviewModal'));
  _modal.show();
}

/* ─── SHARE ─── */
function shareWA(){
  resumeAC();
  const lvN={mudah:'Mudah',sedang:'Sedang',susah:'Susah'}[level];
  const stars=$('end-stars').textContent.replace(/\s/g,'');
  const txt=`Topik: ${topicLabel} | Level: ${lvN}\nSkor: ${score} poin ${stars}\nBenar: ${correctCount} | Salah: ${wrongCount} | Combo max: ${maxCombo}\n\nGame Edukasi PAUD terbaik! 🎓\nirsamrhmtysf.github.io/gamedukasi`;
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

/* ─── INIT ─── */
window.addEventListener('load', ()=>{
  showTopic();
  // Play cheerful opening jingle after first touch
  document.addEventListener('pointerdown', ()=>{
    resumeAC();
    setTimeout(sfxOpening, 80);
  }, {once:true});
});
</script>
