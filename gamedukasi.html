<style>
:root {

*, *::before, *::after { box-sizing: border-box; }
html, body {

h1,h2,h3,.brand { font-family: 'Baloo 2', cursive; }

/* ── BG DECO ── */
.bg-deco { position: fixed; pointer-events: none; z-index: 0; }
.cloud-wrap { top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
.cloud {
  position: absolute; background: rgba(255,255,255,0.55);
  border-radius: 50px; animation: driftCloud linear infinite;
}
.cloud::before,.cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
.cloud::before { width:60%;height:140%;top:-25%;left:15%; }
.cloud::after   { width:40%;height:110%;top:-15%;left:52%; }
@keyframes driftCloud { from{transform:translateX(-300px)} to{transform:translateX(110vw)} }
.floaties { top:0;left:0;width:100%;height:100%; }
.floatie { position:absolute; font-size:1.5rem; animation: floatUp 6s ease-in-out infinite; opacity:.35; }
@keyframes floatUp { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-18px) rotate(15deg)} }

/* ── NAVBAR ── */
.navbar-brand .brand { font-size:1.5rem; color:var(--primary); }
.navbar { background: rgba(255,255,255,0.9) !important; backdrop-filter: blur(10px); box-shadow: 0 2px 16px rgba(0,0,0,.07); }

/* ── GAME CARD ── */
#app {
  position: relative; z-index: 10;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 2px solid rgba(255,255,255,0.8);

/* ── TABS ── */
.topic-btn {
  border: 2px solid #e0d8f0; background: #f7f3ff;

}
.topic-btn.active { background: var(--primary); color:#fff; border-color:var(--primary); }
/* ── TOPIC SELECT SCREEN ── */
#topic-select-screen { display:none; }
.topic-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:18px 10px; border-radius:18px; border:2.5px solid #e0d8f0;
  background:#f7f3ff; cursor:pointer; transition:all .2s;

.topic-card:hover { border-color:var(--primary); background:#ede8ff; transform:translateY(-3px); box-shadow:0 7px 0 #c5b8f0; }
.topic-card:active { transform:translateY(1px); box-shadow:0 2px 0 #c5b8f0; }

/* ── PROGRESS ── */

#prog-fill { height:100%; border-radius:8px; background:linear-gradient(90deg,var(--primary-light),var(--accent)); transition:width .4s; }

@keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

// ── AUDIO ────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }
function tone(f,d,t='sine',v=0.25){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
function sfxCorrect(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.15,'sine',.25),i*80)); }
function sfxWrong()  { [300,220].forEach((f,i)=>setTimeout(()=>tone(f,.22,'sawtooth',.2),i*110)); }
function sfxTick()   { tone(880,.05,'square',.07); }
function sfxStart()  { [400,520,640].forEach((f,i)=>setTimeout(()=>tone(f,.12,'sine',.2),i*80)); }
function sfxEnd(win) {
  if(win) [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.28),i*90));
  else    [350,280].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sawtooth',.2),i*140));
}

      {q:'🐬',a:'Lumba-lumba',ch:['Paus','Hiu','Lumba-lumba','Ikan'],hint:'Mamalia pintar'},
      {q:'🦋',a:'Kupu-kupu',ch:['Lebah','Capung','Kupu-kupu','Belalang'],hint:'Sayapnya indah 🌸'},
      {q:'🐢',a:'Kura-kura',ch:['Buaya','Kura-kura','Biawak','Kadal'],hint:'Jalannya pelan'},
      {q:'🐧',a:'Pinguin',ch:['Pinguin','Elang','Bebek','Angsa'],hint:'Hidup di es ❄️'},
      {q:'🦊',a:'Rubah',ch:['Rubah','Serigala','Anjing','Kucing'],hint:'Berwarna oranye'},
      {q:'🐸',a:'Katak',ch:['Katak','Tokek','Cicak','Buaya'],hint:'Suka di air & darat 💧'},
      {q:'🦒',a:'Jerapah',ch:['Jerapah','Kuda','Zebra','Unta'],hint:'Leher sangat panjang'},

  buah:{
    label:'Ini buah apa?',
    items:[
      {q:'🍎',a:'Apel',ch:['Apel','Mangga','Anggur','Jeruk'],hint:'Merah dan segar'},
      {q:'🍌',a:'Pisang',ch:['Pisang','Pepaya','Nanas','Durian'],hint:'Kuning dan manis'},
      {q:'🍊',a:'Jeruk',ch:['Jeruk','Lemon','Mangga','Apel'],hint:'Bulat berwarna oranye'},
      {q:'🍇',a:'Anggur',ch:['Anggur','Ceri','Stroberi','Bluberi'],hint:'Buah kecil berkelompok'},
      {q:'🍓',a:'Stroberi',ch:['Stroberi','Raspberry','Apel','Ceri'],hint:'Merah berbintik'},
      {q:'🍉',a:'Semangka',ch:['Semangka','Melon','Timun','Labu'],hint:'Merah di dalam, hijau di luar'},
      {q:'🥭',a:'Mangga',ch:['Mangga','Pepaya','Jambu','Belimbing'],hint:'Buah tropis favorit 🌴'},
      {q:'🍍',a:'Nanas',ch:['Nanas','Durian','Rambutan','Kelapa'],hint:'Berduri di atas dan luar'},
      {q:'🥥',a:'Kelapa',ch:['Kelapa','Rambutan','Manggis','Nanas'],hint:'Ada air di dalamnya 💧'},
      {q:'🍑',a:'Persik',ch:['Persik','Plum','Aprikot','Pir'],hint:'Lembut dan harum'},
    ]
  }
};

const LEVEL_CFG = { mudah:{time:15,q:6}, sedang:{time:10,q:8}, susah:{time:6,q:10} };

// ── STATE ─────────────────────────────────────────────────
let topic='huruf', topicLabel='🔤 Huruf', level='mudah';
let queue=[], qIdx=0, score=0, combo=0, answered=false;
let timerInterval=null, timeLeft=0, totalTime=0, totalQ=6;

// ── BG DECO ───────────────────────────────────────────────
(function buildBg(){
  const cw=document.getElementById('clouds');
  for(let i=0;i<5;i++){
    const c=document.createElement('div');
    c.className='cloud';
    const h=15+Math.random()*20, w=80+Math.random()*120;
    c.style.cssText=`width:${w}px;height:${h}px;top:${Math.random()*85}%;animation-duration:${22+Math.random()*22}s;animation-delay:-${Math.random()*25}s;`;
    cw.appendChild(c);
  }
  const fw=document.getElementById('floaties');
  ['⭐','🌟','✨','💫','🌈','🎀','🎈','🌸'].forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='floatie'; el.textContent=s;
    el.style.cssText=`left:${8+i*12}%;top:${10+i*9}%;animation-delay:${i*0.7}s;animation-duration:${5+i*0.5}s;font-size:${1+Math.random()*0.8}rem;`;
    fw.appendChild(el);
  });
})();

// ── HELPERS ───────────────────────────────────────────────
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }
function $(id){ return document.getElementById(id); }

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  $('play-again-btn').addEventListener('click', ()=>{ resumeAC(); startGame(); });
  $('change-topic-btn').addEventListener('click', ()=>{ resumeAC(); showTopicSelect(); });
  showTopicSelect();
});

// ── TOPIC / LEVEL ─────────────────────────────────────────
function pickTopic(t, label){
  resumeAC();
  topic=t; topicLabel=label;
  $('topic-label-display').textContent=label;
  startGame();
}

// ── GAME ──────────────────────────────────────────────────
function startGame(){
  const cfg = LEVEL_CFG[level];
  totalQ=cfg.q; totalTime=cfg.time;
  queue = shuffle(DATA[topic].items).slice(0,totalQ);
  qIdx=0; score=0; combo=0;
  updateScore(0);
  $('stars-nav').textContent='⭐⭐⭐';
  showGame();
  sfxStart();
  showQuestion();
}

function showGame(){
  $('game-section').style.display='block';
  $('end-screen').style.display='none';
  $('topic-select-screen').style.display='none';
}

function showTopicSelect(){
  $('game-section').style.display='none';
  $('end-screen').style.display='none';
  $('topic-select-screen').style.display='block';
}

function showQuestion(){
  if(qIdx>=queue.length){ endGame(); return; }
  answered=false;
  const q=queue[qIdx];
  $('q-label').textContent = DATA[topic].label;
  const qm=$('q-main');
  qm.style.animation='none';
  qm.textContent=q.q;
  setTimeout(()=>{ qm.style.animation='popIn .35s ease'; },10);
  $('q-sub').textContent = level==='mudah' ? '💡 '+q.hint : (level==='sedang'&&qIdx<3?'💡 '+q.hint:'');
  $('feedback').textContent='';
  $('feedback').style.color='';
  $('next-btn').style.display='none';
  $('q-counter').textContent=`Soal ${qIdx+1}/${totalQ}`;
  $('combo-label').textContent=combo>=2?`🔥 Combo x${combo}`:'';
  $('prog-fill').style.width=(qIdx/totalQ*100)+'%';

  const ch=shuffle(q.ch);
  const choicesEl=$('choices');
  choicesEl.innerHTML='';
  ch.forEach(c=>{
    const col=document.createElement('div');
    col.className='col-6';
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c;
    btn.addEventListener('click',()=>{ resumeAC(); checkAnswer(c,btn,q); });
    col.appendChild(btn);
    choicesEl.appendChild(col);
  });

  startTimer();
}

function nextQuestion(){ qIdx++; showQuestion(); }

// ── TIMER ─────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);
  timeLeft=totalTime;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    if(timeLeft<=3&&!answered) sfxTick();
    if(timeLeft<=0){ clearInterval(timerInterval); if(!answered) timeUp(); }
    updateTimerUI();
  },100);
}
function updateTimerUI(){
  const pct=Math.max(0,timeLeft/totalTime*100);
  const fill=$('timer-fill');
  fill.style.width=pct+'%';
  fill.style.background=pct>50?'linear-gradient(90deg,#06d6a0,#38f9d7)':pct>25?'linear-gradient(90deg,#f9d423,#f83600)':'#f83600';
  $('timer-label').textContent=Math.ceil(Math.max(0,timeLeft));
}
function timeUp(){
  answered=true; combo=0; sfxWrong();
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent===queue[qIdx].a) b.classList.add('reveal');
  });
  $('feedback').innerHTML='⏰ <span style="color:#e57373;font-weight:800">Waktu habis!</span>';
  $('next-btn').style.display='block';
}

// ── ANSWER ────────────────────────────────────────────────
function checkAnswer(chosen,btn,q){
  if(answered)return;
  answered=true;
  clearInterval(timerInterval);
  const ok=chosen===q.a;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent===q.a) b.classList.add('correct');
  });
  if(ok){
    sfxCorrect(); combo++;
    const bonus=combo>=2?combo*5:0;
    const tBonus=Math.floor(timeLeft)*2;
    const gained=10+bonus+tBonus;
    score+=gained; updateScore(score);
    const bText=bonus>0?` (+🔥${bonus} combo +⏱${tBonus})`:`(+⏱${tBonus})`;
    $('feedback').innerHTML=`✅ <span style="color:#065f46;font-weight:800">Betul! +${gained}${bText}</span>`;
    const stars=score>=totalQ*22?'⭐⭐⭐':score>=totalQ*14?'⭐⭐':'⭐';
    $('stars-nav').textContent=stars;
  } else {
    btn.classList.remove('correct'); btn.classList.add('wrong');
    sfxWrong(); combo=0;
    $('feedback').innerHTML=`❌ <span style="color:#7f1d1d;font-weight:800">Salah! Jawaban: ${q.a}</span>`;
  }
  $('next-btn').style.display='block';
}

function updateScore(v){
  $('score-display').textContent=v;
}

// ── END ───────────────────────────────────────────────────
function endGame(){
  clearInterval(timerInterval);
  const maxScore=totalQ*30;
  const pct=score/maxScore;
  const win=pct>=0.5;
  sfxEnd(win);
  if(win) confetti();
  $('game-section').style.display='none';
  $('topic-select-screen').style.display='none';
  $('end-screen').style.display='block';
  $('trophy-emoji').textContent=pct>=0.8?'🏆':pct>=0.5?'🥈':'🎖️';
  $('end-title').textContent=pct>=0.8?'Luar Biasa! 🎉':pct>=0.5?'Bagus Sekali! 👏':'Terus Berlatih! 💪';
  $('end-stars').textContent=pct>=0.8?'⭐⭐⭐':pct>=0.5?'⭐⭐':'⭐';
  $('end-score-pill').textContent=score+' poin';
  $('end-msg').textContent=`Topik ${topicLabel}`;
}

// ── CONFETTI ──────────────────────────────────────────────
function confetti(){
  const colors=['#7c5cbf','#ff6b9d','#ffca3a','#06d6a0','#4cc9f0','#f72585'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

// ── SHARE ─────────────────────────────────────────────────
function getShareText(){
  const stars=$('end-stars').textContent;
  const topicLabel=topic.charAt(0).toUpperCase()+topic.slice(1);
 // return `Aku baru main game edukasi\n\n📚 Topik: ${topicLabel}\n⚡ Level: ${level.charAt(0).toUpperCase()+level.slice(1)}\n🏆 Skor: ${score} poin\n${stars}\n\nYuk coba juga! 👇\nhttps://belajaryuk.app`;
  return `Topik game: ${topicLabel}\nSkor: ${score} poin\n${stars}\n\nAku lagi main game edukasi terbaik untuk anak PAUD\n\n***\nAda 6 topik game edukasi seru.\nHuruf, Angka, Warna, Bentuk, Hewan, Buah\n\nAda sistem combo & Bonus waktu yg bikin asik maininnya.\njawaban cepat dan beruntun dpt poin ekstra.\n***\n\nYuk ikutan main juga! 👇\nirsamrhmtysf.github.io/gamedukasi`;
}
function shareWA(){
  const txt=encodeURIComponent(getShareText());
  window.open(`https://wa.me/?text=${txt}`,'_blank');
}
